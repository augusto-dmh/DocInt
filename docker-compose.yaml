x-php-env: &php-env
  DB_HOST: mysql
  DB_PORT: 3306
  REDIS_HOST: redis
  REDIS_PORT: 6379
  RABBITMQ_HOST: rabbitmq
  RABBITMQ_PORT: 5672
  RABBITMQ_USER: docintern
  RABBITMQ_PASSWORD: secret
  RABBITMQ_VHOST: /docintern
  FILESYSTEM_DISK: s3
  QUEUE_CONNECTION: rabbitmq
  PROCESSING_QUEUE_CONNECTION: rabbitmq
  PROCESSING_OCR_PROVIDER: openai
  PROCESSING_CLASSIFICATION_PROVIDER: openai

services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: docintern-app
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - vendor_data:/var/www/html/vendor
    environment:
      <<: *php-env
      SESSION_DRIVER: redis
      CACHE_STORE: redis
      RABBITMQ_MANAGEMENT_SCHEME: http
      RABBITMQ_MANAGEMENT_HOST: rabbitmq
      RABBITMQ_MANAGEMENT_PORT: 15672
      RABBITMQ_MANAGEMENT_USER: docintern
      RABBITMQ_MANAGEMENT_PASSWORD: secret
      RABBITMQ_MANAGEMENT_VHOST: /docintern
      RABBITMQ_MANAGEMENT_TIMEOUT: 5
      MAIL_HOST: mailpit
      MAIL_PORT: 1025
    command: >
      sh -lc "
      mkdir -p vendor bootstrap/cache storage/framework/cache storage/framework/sessions storage/framework/testing storage/framework/views storage/logs &&
      chown -R docintern:docintern /var/www/html/vendor /var/www/html/bootstrap/cache /var/www/html/storage &&
      if [ ! -f vendor/autoload.php ]; then
        su docintern -s /bin/bash -c 'composer install --no-interaction --prefer-dist';
      fi &&
      exec php-fpm
      "
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "php-fpm", "-t"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - docintern

  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    container_name: docintern-nginx
    ports:
      - "80:80"
    volumes:
      - ./:/var/www/html:ro
      - vendor_data:/var/www/html/vendor:ro
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/favicon.ico || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - docintern

  node:
    build:
      context: .
      dockerfile: docker/node/Dockerfile
    container_name: docintern-node
    working_dir: /var/www/html
    ports:
      - "5173:5173"
    volumes:
      - ./:/var/www/html
      - vendor_data:/var/www/html/vendor
      - node_modules_data:/var/www/html/node_modules
    environment:
      CHOKIDAR_USEPOLLING: "true"
    command: >
      sh -lc "
      mkdir -p node_modules public build bootstrap/cache resources/js/actions resources/js/routes &&
      chown -R node:node /var/www/html/node_modules /var/www/html/public /var/www/html/bootstrap/cache /var/www/html/resources/js/actions /var/www/html/resources/js/routes &&
      if [ ! -x node_modules/.bin/vite ]; then
        su node -s /bin/sh -c 'npm install';
      fi &&
      exec su node -s /bin/sh -c 'npm run dev -- --host 0.0.0.0 --port 5173'
      "
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:5173/@vite/client || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - docintern

  mysql:
    image: mysql:8.0
    container_name: docintern-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: docintern
      MYSQL_USER: docintern
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$$MYSQL_USER -p$$MYSQL_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - docintern

  redis:
    image: redis:7-alpine
    container_name: docintern-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - docintern

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: docintern-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: docintern
      RABBITMQ_DEFAULT_PASS: secret
      RABBITMQ_DEFAULT_VHOST: /docintern
      RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS: -rabbitmq_management load_definitions "/etc/rabbitmq/definitions.json"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./docker/rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - docintern

  mailpit:
    image: axllent/mailpit:v1.27.4
    container_name: docintern-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8025/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - docintern

  worker:
    build:
      context: .
      dockerfile: docker/workers/Dockerfile
    container_name: docintern-worker
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - vendor_data:/var/www/html/vendor
    environment:
      <<: *php-env
    depends_on:
      app:
        condition: service_healthy
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - docintern

  scheduler:
    build:
      context: .
      dockerfile: docker/scheduler/Dockerfile
    container_name: docintern-scheduler
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - vendor_data:/var/www/html/vendor
    environment:
      <<: *php-env
    depends_on:
      app:
        condition: service_healthy
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - docintern

networks:
  docintern:
    driver: bridge

volumes:
  vendor_data:
    driver: local
  node_modules_data:
    driver: local
  mysql_data:
    driver: local
  redis_data:
    driver: local
  rabbitmq_data:
    driver: local
